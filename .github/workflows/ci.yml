name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  GO_VERSION: "1.25"
  GOFLAGS: "-mod=readonly"
  GOPATH: ${{ github.workspace }}/.go
  GOMODCACHE: ${{ github.workspace }}/.go/pkg/mod
  GOCACHE: ${{ github.workspace }}/.go/cache

jobs:
  gate:
    name: PR · access gate
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      allow: ${{ steps.decide.outputs.allow }}
    steps:
      - id: decide
        env:
          EVENT: ${{ github.event_name }}
          SAME_REPO: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
          ACTOR: ${{ github.event.pull_request.user.login }}
          ASSOC: ${{ github.event.pull_request.author_association }}
        run: |
          set -eu
          if [[ "$EVENT" == "push" ]]; then
            echo "allow=true" >> "$GITHUB_OUTPUT"
            echo "::notice::push event — CI allowed."
            exit 0
          fi

          # Only PR path remains.
          allow=false
          reason="not a contributor"

          if [[ "$SAME_REPO" != "true" ]]; then
            reason="PR comes from a fork"
          elif [[ "$ACTOR" == "dependabot[bot]" ]]; then
            reason="Dependabot PRs do not run on the self-hosted runner"
          else
            case "$ASSOC" in
              OWNER|COLLABORATOR|MEMBER|CONTRIBUTOR)
                allow=true
                ;;
              *)
                reason="author_association='$ASSOC' is not in {OWNER,COLLABORATOR,MEMBER,CONTRIBUTOR}"
                ;;
            esac
          fi

          echo "allow=$allow" >> "$GITHUB_OUTPUT"
          if [[ "$allow" == "true" ]]; then
            echo "::notice::PR allowed for self-hosted CI (actor=$ACTOR, assoc=$ASSOC)."
          else
            echo "::warning::Self-hosted CI skipped for this PR. Reason: $reason."
          fi

  go-test:
    name: Go · test
    needs: gate
    if: needs.gate.outputs.allow == 'true'
    runs-on: [self-hosted, linux]
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          clean: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify modules
        run: |
          go mod download
          go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (with coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -20

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 7

  go-lint:
    name: Go · lint
    needs: gate
    if: needs.gate.outputs.allow == 'true'
    runs-on: [self-hosted, linux]
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          clean: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: gofmt check
        # gofmt -l walks given directories recursively and does NOT skip dotted
        # subdirs, so passing the project root would chew on the in-workspace
        # module cache at ${{ github.workspace }}/.go/pkg/mod and report
        # third-party code as "needs reformat". Enumerate project .go files
        # explicitly via find with prune.
        run: |
          files=$(find . \
            \( -path ./.go -o -path ./.git -o -path ./vendor \) -prune \
            -o -type f -name '*.go' -print)
          if [ -z "$files" ]; then
            echo "no .go files found"
            exit 0
          fi
          fmt_out=$(gofmt -l -s $files)
          if [ -n "$fmt_out" ]; then
            echo "::error::gofmt would reformat:"
            echo "$fmt_out"
            exit 1
          fi

      - name: Install golangci-lint
        # Build the linter from source with the runner's own Go (1.25). This
        # avoids the v1.x prebuilt binary refusing to lint Go 1.25 code, and
        # avoids pinning a specific golangci-lint-action major version that
        # might lag behind upstream linter releases.
        run: |
          GOFLAGS= go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: golangci-lint
        run: golangci-lint run
